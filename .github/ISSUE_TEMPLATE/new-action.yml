name: Add Action
description: Request adding a GitHub Action to the chainguard-actions organization
labels: ["new-action"]
body:
  - type: input
    id: action-url
    attributes:
      label: Action URL
      description: GitHub Action reference or repository URL of the action.
      placeholder: e.g. actions/checkout@v6
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other details or known consumers.
